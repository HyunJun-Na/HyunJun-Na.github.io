<svg viewBox="0 0 1080 450" xmlns="http://www.w3.org/2000/svg" font-family="Inter,system-ui,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5c6470"/>
    </marker>
  </defs>

  <!-- ── LCD (UI output) ── -->
  <rect x="285" y="16" width="160" height="48" rx="8" fill="#ffffff" stroke="#c9cfda" stroke-width="1.4"/>
  <text x="365" y="36" text-anchor="middle" font-size="14" font-weight="600" fill="#1f3864">LCD</text>
  <text x="365" y="53" text-anchor="middle" font-size="11.5" fill="#5c6470">mode display</text>
  <line x1="365" y1="110" x2="365" y2="68" stroke="#5c6470" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- ── Forward path ── -->
  <!-- Foot switch -->
  <rect x="20" y="110" width="180" height="84" rx="8" fill="#ffffff" stroke="#c9cfda" stroke-width="1.4"/>
  <text x="110" y="145" text-anchor="middle" font-size="14" font-weight="600" fill="#1f3864">Foot switch</text>
  <text x="110" y="164" text-anchor="middle" font-size="11.5" fill="#5c6470">mode select · 1.5 / 4 / 6 kgf</text>

  <!-- Arduino -->
  <rect x="245" y="110" width="240" height="84" rx="8" fill="#f0f5fb" stroke="#2e6fb0" stroke-width="1.6"/>
  <text x="365" y="136" text-anchor="middle" font-size="14" font-weight="600" fill="#1f3864">Arduino</text>
  <text x="365" y="155" text-anchor="middle" font-size="11.5" fill="#5c6470">PI constant-tension control</text>
  <text x="365" y="172" text-anchor="middle" font-size="10.8" fill="#5c6470">slack / tension state machine · soft zone</text>

  <!-- BTS7960 -->
  <rect x="530" y="110" width="160" height="84" rx="8" fill="#f0f5fb" stroke="#2e6fb0" stroke-width="1.6"/>
  <text x="610" y="145" text-anchor="middle" font-size="14" font-weight="600" fill="#1f3864">BTS7960 driver</text>
  <text x="610" y="164" text-anchor="middle" font-size="11.5" fill="#5c6470">PWM</text>

  <!-- Motor + drum -->
  <rect x="740" y="110" width="170" height="84" rx="8" fill="#f0f5fb" stroke="#2e6fb0" stroke-width="1.6"/>
  <text x="825" y="145" text-anchor="middle" font-size="14" font-weight="600" fill="#1f3864">DC motor · drum</text>
  <text x="825" y="164" text-anchor="middle" font-size="11.5" fill="#5c6470">winds strap → tension</text>

  <!-- forward arrows -->
  <line x1="200" y1="152" x2="239" y2="152" stroke="#5c6470" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="485" y1="152" x2="524" y2="152" stroke="#5c6470" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="690" y1="152" x2="734" y2="152" stroke="#5c6470" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- output: assistive force -->
  <line x1="910" y1="152" x2="968" y2="152" stroke="#5c6470" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="976" y="146" font-size="11.5" fill="#5c6470">assistive force</text>
  <text x="976" y="163" font-size="11.5" fill="#5c6470">to gym machine</text>

  <!-- ── Feedback: current sensing ── -->
  <rect x="600" y="250" width="260" height="56" rx="8" fill="#ffffff" stroke="#c9cfda" stroke-width="1.4"/>
  <text x="730" y="272" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1f3864">ACS712 current sensing</text>
  <text x="730" y="290" text-anchor="middle" font-size="11.5" fill="#5c6470">tension estimate · 0.8 kgf/A</text>
  <line x1="795" y1="194" x2="795" y2="244" stroke="#5c6470" stroke-width="1.4" marker-end="url(#arr)"/>
  <polyline points="600,278 365,278 365,200" fill="none" stroke="#5c6470" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- ── Feedback: encoder ── -->
  <rect x="600" y="330" width="260" height="56" rx="8" fill="#ffffff" stroke="#c9cfda" stroke-width="1.4"/>
  <text x="730" y="352" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1f3864">Encoder</text>
  <text x="730" y="370" text-anchor="middle" font-size="11.5" fill="#5c6470">travel soft limits</text>
  <line x1="875" y1="194" x2="875" y2="358" stroke="#5c6470" stroke-width="1.4"/>
  <polyline points="875,358 866,358" fill="none" stroke="#5c6470" stroke-width="1.4" marker-end="url(#arr)"/>
  <polyline points="600,358 330,358 330,200" fill="none" stroke="#5c6470" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- safety note -->
  <text x="540" y="432" text-anchor="middle" font-size="11.5" fill="#5c6470" font-style="italic">Safety: over-tension hard limit cuts motor power · encoder soft limits bound strap travel</text>
</svg>
